<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#003d99" stroke-width="2"/>
  
  <!-- Radiation symbol (outer rings) -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#0052cc" stroke-width="2" opacity="0.6"/>
  <circle cx="100" cy="100" r="40" fill="none" stroke="#dc143c" stroke-width="2" opacity="0.8"/>
  
  <!-- Center circle -->
  <circle cx="100" cy="100" r="25" fill="#003d99"/>
  
  <!-- Radiation rays (AI nodes) -->
  <line x1="100" y1="30" x2="100" y2="50" stroke="#dc143c" stroke-width="3" stroke-linecap="round"/>
  <line x1="142" y1="42" x2="128" y2="56" stroke="#dc143c" stroke-width="3" stroke-linecap="round"/>
  <line x1="170" y1="100" x2="150" y2="100" stroke="#dc143c" stroke-width="3" stroke-linecap="round"/>
  <line x1="142" y1="158" x2="128" y2="144" stroke="#dc143c" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="170" x2="100" y2="150" stroke="#dc143c" stroke-width="3" stroke-linecap="round"/>
  <line x1="58" y1="158" x2="72" y2="144" stroke="#dc143c" stroke-width="3" stroke-linecap="round"/>
  <line x1="30" y1="100" x2="50" y2="100" stroke="#dc143c" stroke-width="3" stroke-linecap="round"/>
  <line x1="58" y1="42" x2="72" y2="56" stroke="#dc143c" stroke-width="3" stroke-linecap="round"/>
  
  <!-- AI dots at ray endpoints -->
  <circle cx="100" cy="30" r="4" fill="#dc143c"/>
  <circle cx="142" cy="42" r="4" fill="#dc143c"/>
  <circle cx="170" cy="100" r="4" fill="#dc143c"/>
  <circle cx="142" cy="158" r="4" fill="#dc143c"/>
  <circle cx="100" cy="170" r="4" fill="#dc143c"/>
  <circle cx="58" cy="158" r="4" fill="#dc143c"/>
  <circle cx="30" cy="100" r="4" fill="#dc143c"/>
  <circle cx="58" cy="42" r="4" fill="#dc143c"/>
  
  <!-- AI symbol in center (neural network style) -->
  <circle cx="100" cy="100" r="8" fill="#0052cc" opacity="0.8"/>
  <circle cx="100" cy="85" r="3" fill="#ffffff"/>
  <circle cx="110" cy="105" r="3" fill="#ffffff"/>
  <circle cx="90" cy="105" r="3" fill="#ffffff"/>
  <line x1="100" y1="92" x2="110" y2="102" stroke="#ffffff" stroke-width="1" opacity="0.7"/>
  <line x1="100" y1="92" x2="90" y2="102" stroke="#ffffff" stroke-width="1" opacity="0.7"/>
</svg>
